server {
    listen 80;
    listen [::]:80;
    server_name easychemistry.ru www.easychemistry.ru;

    location / {
        return 301 https://easychemistry.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name easychemistry.ru;

    ssl_certificate /etc/letsencrypt/live/easychemistry.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easychemistry.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.easychemistry.ru;

    ssl_certificate /etc/letsencrypt/live/easychemistry.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easychemistry.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://easychemistry.ru$request_uri;
}
